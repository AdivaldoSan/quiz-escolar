<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalia+ | Dashboard</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="favicon.svg">

<style>

.aplicacoes-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.aplicacao-card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
cursor:pointer;
transition:0.3s;
}

.aplicacao-card:hover{
transform:translateY(-5px);
}

.aplicacao-nome{
font-size:18px;
font-weight:600;
margin-bottom:10px;
}

.aplicacao-info{
font-size:14px;
color:#64748b;
}

.turmas-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.turma-card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
text-align:center;
cursor:pointer;
}

.circle{
width:120px;
height:120px;
border-radius:50%;
margin:0 auto 15px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:bold;
color:white;
}

.verde{background:#16a34a;}
.amarelo{background:#eab308;}
.vermelho{background:#dc2626;}
.cinza{background:#94a3b8;}

.section{
background:white;
padding:25px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.06);
}

.barra-bg{
width:100%;
height:10px;
background:#e2e8f0;
border-radius:8px;
overflow:hidden;
}

.barra-fill{
height:100%;
}

</style>

</head>

<body>

<script src="./js/conexao.js"></script>
<script src="./js/layout.js"></script>

<script>


let aplicacoes=[]
let respostas=[]

window.onload=iniciarPagina

function iniciarPagina(){

criarLayout()

document.getElementById("conteudo").innerHTML=`
<h2 style="margin-bottom:20px;">📊 Dashboard</h2>
<div id="areaDashboard"></div>
`

carregarAplicacoes()

}

async function carregarAplicacoes(){

const token=localStorage.getItem("TOKEN")

const dados=await fetchProtegido(
API+"?tipo=listarAplicacoes&token="+token
)

if(!dados || dados.length<=1){
document.getElementById("areaDashboard").innerHTML="Nenhuma aplicação encontrada"
return
}

aplicacoes=dados.slice(1)

mostrarAplicacoes()

}

function mostrarAplicacoes(){

let html=`<div class="aplicacoes-grid">`

aplicacoes.forEach(a=>{

const id=a[0]
const nome=a[1]

let turmas=[]

try{
turmas=JSON.parse(a[3]||"[]")
}catch(e){

if(typeof a[3]==="string"){
turmas=a[3].split(",").map(t=>t.trim())
}

}

html+=`
<div class="aplicacao-card" onclick="abrirAplicacao('${id}')">

<div class="aplicacao-nome">${nome}</div>

<div class="aplicacao-info">
${turmas.length} turmas
</div>

</div>
`

})

html+=`</div>`

document.getElementById("areaDashboard").innerHTML=html

}

async function abrirAplicacao(id){

const token=localStorage.getItem("TOKEN")

const dados=await fetchProtegido(
API+"?tipo=respostasPorAplicacao&id="+id+"&token="+token
)

if(!dados || dados.length<=1){
document.getElementById("areaDashboard").innerHTML="Erro ao carregar respostas"
return
}

const cab=dados[0]

respostas=dados.slice(1).map(l=>{

let obj={}

cab.forEach((c,i)=>{
obj[c]=l[i]
})

return obj

})

mostrarTurmas(id)

}

function definirCor(media){

media=parseFloat(media)

if(media>=70)return"verde"
if(media>=50)return"amarelo"
if(media>0)return"vermelho"
return"cinza"

}

function mostrarTurmas(idAplicacao){

const porTurma={}

respostas.forEach(r=>{

const turma=r.TURMA
const aluno=r.ALUNO

if(!porTurma[turma]){

porTurma[turma]={
alunos:new Set(),
acertos:0,
total:0
}

}

porTurma[turma].alunos.add(aluno)
porTurma[turma].total++

if(r.MARCADA===r.CORRETA)porTurma[turma].acertos++

})

let html=`
<div style="margin-bottom:20px;">
<button onclick="mostrarAplicacoes()">← Voltar</button>
</div>

<div class="turmas-grid">
`

Object.keys(porTurma).forEach(t=>{

const dados=porTurma[t]

let media=0

if(dados.total>0){
media=((dados.acertos/dados.total)*100).toFixed(1)
}

const cor=definirCor(media)

html+=`

<div class="turma-card"
onclick="mostrarAnalise('${idAplicacao}','${t}')">

<div class="circle ${cor}">
${media}%
</div>

<strong>${t}</strong>

<div style="margin-top:10px;font-size:13px;color:#64748b;">
${dados.alunos.size} alunos
</div>

</div>

`

})

html+=`</div>`

document.getElementById("areaDashboard").innerHTML=html

}

function mostrarAnalise(idAplicacao,turma){

const filtradas=respostas.filter(r=>r.TURMA===turma)

const descritores={}

filtradas.forEach(r=>{

let d="SEM"

if(r.QUESTAO){

const m=r.QUESTAO.match(/D\d+/)

if(m)d=m[0]

}

if(!descritores[d]){
descritores[d]={acertos:0,total:0}
}

descritores[d].total++

if(r.MARCADA===r.CORRETA){
descritores[d].acertos++
}

})

let html=`
<div style="margin-bottom:20px;">
<button onclick="mostrarTurmas('${idAplicacao}')">← Voltar</button>
</div>

<div class="section">
<h3>📚 Desempenho por Descritor</h3>
`

Object.keys(descritores).forEach(d=>{

const total=descritores[d].total
const acertos=descritores[d].acertos

const perc=total>0 ? (acertos/total)*100 : 0

const cor=definirCor(perc)

html+=`

<div style="margin-bottom:15px;">
<strong>${d}</strong> - ${perc.toFixed(1)}%

<div class="barra-bg">
<div class="barra-fill ${cor}"
style="width:${perc}%"></div>
</div>

</div>

`

})

html+=`

<div style="margin-top:20px;background:#eef2ff;padding:15px;border-radius:8px;">
🧠 Em breve análises inteligentes com IA gerarão plano de intervenção automático.
</div>

</div>
`

document.getElementById("areaDashboard").innerHTML=html

}

</script>

</body>
</html>
