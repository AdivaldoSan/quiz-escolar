<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Scanner Avalia+</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#reader{
width:100%;
}

#resultado{
padding:10px;
font-size:18px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
}

.oculto{
display:none;
}

</style>
</head>


<body>

<h2 id="titulo">Scanner Avalia+</h2>

<div id="reader"></div>

<div id="resultado">
Aponte para o QR da prova
</div>

<div id="acoes" class="oculto">
<button onclick="confirmar()">Confirmar envio</button>
<button onclick="lerNovamente()">Ler novamente</button>
</div>

<div id="proximo" class="oculto">
<button onclick="reiniciar()">Próxima prova</button>
</div>


<script>

let scanner
let gabarito=""
let respostas=""
let folha=""

/* =========================
BIP
========================= */

function beep(){

const ctx=new AudioContext()
const osc=ctx.createOscillator()
osc.connect(ctx.destination)
osc.frequency.value=900
osc.start()
setTimeout(()=>osc.stop(),150)

}

/* =========================
VIBRAÇÃO
========================= */

function vibrar(){

if(navigator.vibrate){
navigator.vibrate(150)
}

}

/* =========================
INICIAR SCANNER QR
========================= */

function iniciarQR(){

scanner=new Html5Qrcode("reader")

scanner.start(

{facingMode:"environment"},

{
fps:10,


qrbox:{
width: Math.min(window.innerWidth*0.8,400),
height: Math.min(window.innerWidth*0.8,400)
}


},

(qr)=>{

lerQR(qr)

}

)

}

/* =========================
LER QR
========================= */

function lerQR(dado){

if(!dado.startsWith("AVP")) return

beep()
vibrar()

scanner.stop()

let partes = dado.split("|")

let sistema = partes[0]
let prova = partes[1]
folha = partes[2]
let qtd = parseInt(partes[3])
gabarito = partes[4]

document.getElementById("resultado").innerHTML =

`
QR detectado ✓<br><br>

Prova: ${prova}<br>
Folha: ${folha}<br>
Questões: ${qtd}<br>
Gabarito: ${gabarito}<br><br>

Preparando leitura das respostas...
`

/* guardar quantidade */

window.qtdQuestoes = qtd

setTimeout(lerBolhas,1000)

}

/* =========================
LER BOLHAS (SIMULAÇÃO)
========================= */

function lerBolhas(){

const alternativas = ["A","B","C","D"]

respostas = ""

for(let i=0;i<window.qtdQuestoes;i++){

respostas += alternativas[Math.floor(Math.random()*4)]

}

mostrarResultado()

}

/* =========================
MOSTRAR RESULTADO
========================= */

function mostrarResultado(){

let acertos = 0

for(let i=0;i<window.qtdQuestoes;i++){

if(gabarito[i] === respostas[i]) acertos++

}

document.getElementById("resultado").innerHTML =

`
Respostas detectadas<br><br>

Aluno: ${respostas}<br>
Gabarito: ${gabarito}<br><br>

Acertos: ${acertos}/${window.qtdQuestoes}
`

document.getElementById("acoes").classList.remove("oculto")

}

/* =========================
LER NOVAMENTE
========================= */

function lerNovamente(){

document.getElementById("acoes").classList.add("oculto")

document.getElementById("resultado").innerHTML="Lendo novamente..."

setTimeout(lerBolhas,1000)

}

/* =========================
CONFIRMAR ENVIO
========================= */

function confirmar(){

document.getElementById("acoes").classList.add("oculto")

document.getElementById("resultado").innerHTML=

`
Enviando resultado ao Avalia+...
`

setTimeout(()=>{

document.getElementById("resultado").innerHTML=

`
✓ Resultado enviado<br><br>

Folha ${folha} registrada
`

document.getElementById("proximo").classList.remove("oculto")

},1000)

}

/* =========================
PRÓXIMA PROVA
========================= */

function reiniciar(){

document.getElementById("proximo").classList.add("oculto")

document.getElementById("resultado").innerHTML="Aponte para o QR da prova"

iniciarQR()

}

/* =========================
INICIAR
========================= */

iniciarQR()

</script>

</body>
</html>
