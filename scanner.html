Aponte a câmera para o QR Code da prova
</div>

</div>

<script>


/* ================================
BIP SONORO
================================ */

function beep(){

const audioCtx = new (window.AudioContext || window.webkitAudioContext)()

const oscillator = audioCtx.createOscillator()
const gainNode = audioCtx.createGain()

oscillator.connect(gainNode)
gainNode.connect(audioCtx.destination)

oscillator.frequency.value = 900
oscillator.type = "sine"

gainNode.gain.value = 0.2

oscillator.start()

setTimeout(()=>{
oscillator.stop()
},150)

}


/* ================================
VIBRAÇÃO
================================ */

function vibrar(){

if(navigator.vibrate){
navigator.vibrate(120)
}

}


/* ================================
VERIFICAR SESSÃO (FUTURO)
================================ */

function verificarSessao(){

/*

futuro:

fetch("/api/session")

location.href="/login.html"
}

iniciarScanner()

/* ================================
INICIAR SCANNER
================================ */

function iniciarScanner(){

document.getElementById("status").innerText="Scanner ativo"

const scanner = new Html5Qrcode("reader")

scanner.start(

{
facingMode:"environment",
aspectRatio:1.777
},

{
fps:10,
qrbox:{
width: Math.min(window.innerWidth*0.8,400),
height: Math.min(window.innerWidth*0.8,400)
}
},

(qrMessage)=>{

processarQR(qrMessage)

},

(error)=>{}

)

}


/* ================================
PROCESSAR QR
================================ */

function processarQR(dado){

try{

const partes = dado.split("|")

if(partes[0] !== "AVP"){
return
}

const aplicacao = partes[1]
const folha = partes[2]
const gabarito = partes[3]


/* feedback */

beep()
vibrar()


/* atualizar interface */

document.getElementById("titulo").innerText =
"Prova "+aplicacao+" | Folha "+folha

document.getElementById("resultado").innerText =
"QR detectado com sucesso"

document.getElementById("instrucao").innerText =
"Posicione o gabarito na câmera para leitura das respostas"


/* salvar temporário */

window.provaAtual = {

aplicacao: aplicacao,
folha: folha,
gabarito: gabarito

}


}catch(e){

console.log("QR inválido")

}

}


/* ================================
LEITURA DAS RESPOSTAS (FUTURO)
================================ */

Aqui entrará:

exemplo retorno:

["A","C","B","D","A","B"]

*/

}


/* ================================
CORRIGIR PROVA
================================ */

function corrigir(respostas,gabarito){

let acertos = 0

for(let i=0;i<respostas.length;i++){

if(respostas[i] === gabarito[i]){
acertos++
}

}

return acertos

}


/* ================================
ENVIAR PARA SERVIDOR
================================ */

function enviarResultado(aplicacao,folha,respostas,acertos){

fetch("/api/scanner/enviar",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

aplicacao:aplicacao,
folha:folha,
respostas:respostas,
acertos:acertos

})

})

}


verificarSessao()

</script>
