<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Scanner Avalia+</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#reader{
width:100%;
}

#resultado{
padding:10px;
font-size:18px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
}

.oculto{
display:none;
}

</style>
</head>


<body>

<h2 id="titulo">Scanner Avalia+</h2>

<div id="reader"></div>

<div id="resultado">
Aponte para o QR da prova
</div>

<div id="acoes" class="oculto">
<button onclick="confirmar()">Confirmar envio</button>
<button onclick="lerNovamente()">Ler novamente</button>
</div>

<div id="proximo" class="oculto">
<button onclick="reiniciar()">Próxima prova</button>
</div>


<script>

let scanner
let gabarito=""
let respostas=""
let folha=""

/* =========================
BIP
========================= */

function beep(){

const ctx=new AudioContext()
const osc=ctx.createOscillator()
osc.connect(ctx.destination)
osc.frequency.value=900
osc.start()
setTimeout(()=>osc.stop(),150)

}

/* =========================
VIBRAÇÃO
========================= */

function vibrar(){

if(navigator.vibrate){
navigator.vibrate(150)
}

}

/* =========================
INICIAR SCANNER QR
========================= */

function iniciarQR(){

scanner=new Html5Qrcode("reader")

scanner.start(

{facingMode:"environment"},

{
fps:10,


qrbox:{
width: Math.min(window.innerWidth*0.8,400),
height: Math.min(window.innerWidth*0.8,400)
}


},

(qr)=>{

lerQR(qr)

}

)

}

/* =========================
LER QR
========================= */
/* =========================
LER QR
========================= */

function lerQR(dado){

if(!dado.startsWith("AVP")) return

beep()
vibrar()

scanner.pause(true)

let partes = dado.split("|")

let prova = partes[1]
folha = partes[2]
let qtd = parseInt(partes[3])
gabarito = partes[4]

window.qtdQuestoes = qtd

document.getElementById("resultado").innerHTML =

`
QR detectado ✓<br><br>
Folha: ${folha}<br>
Questões: ${qtd}<br><br>
Lendo respostas...
`

setTimeout(()=>{

iniciarLeituraBolhas()

},600)

}

  
/*==================*/
  

function iniciarLeituraBolhas(){

navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"}

})
.then(stream=>{

let video=document.createElement("video")

video.srcObject=stream
video.play().catch(()=>{})
  
document.getElementById("reader").innerHTML=""
document.getElementById("reader").appendChild(video)

setTimeout(()=>{

lerBolhas(video)

},1000)

})

}

/* =========================
LER BOLHAS (SIMULAÇÃO)
========================= */
function lerBolhas(){

const video = document.querySelector("video")

if(!video || video.videoWidth === 0){
setTimeout(lerBolhas,200)
return
}

const canvas = document.createElement("canvas")
const ctx = canvas.getContext("2d")

canvas.width = video.videoWidth
canvas.height = video.videoHeight

ctx.drawImage(video,0,0)

const largura = canvas.width
const altura = canvas.height

const frame = ctx.getImageData(0,0,largura,altura)

/* detectar pixels escuros */

const pontos = []

for(let y=0;y<altura;y+=6){
for(let x=0;x<largura;x+=6){

let idx = (y*largura + x)*4

let r = frame.data[idx]
let g = frame.data[idx+1]
let b = frame.data[idx+2]

let brilho = (r+g+b)/3

if(brilho < 110){

pontos.push({x,y})

if(pontos.length < 50){
document.getElementById("resultado").innerHTML="Poucos pontos detectados"
return
}

}

}
}

/* agrupar pontos */

const grupos = []

pontos.forEach(p=>{

let achou=false

for(let g of grupos){

let dx = p.x - g.cx
let dy = p.y - g.cy

if(Math.sqrt(dx*dx + dy*dy) < 26){

g.x += p.x
g.y += p.y
g.count++

g.cx = g.x / g.count
g.cy = g.y / g.count

achou=true
break

}

}

if(!achou){

grupos.push({
x:p.x,
y:p.y,
cx:p.x,
cy:p.y,
count:1
})

}

})

/* filtrar bolhas */

const bolhas = grupos.filter(g => g.count > 8 && g.count < 120)

/* desenhar centros */

ctx.fillStyle="red"

bolhas.forEach(b=>{

ctx.beginPath()
ctx.arc(b.cx,b.cy,8,0,Math.PI*2)
ctx.fill()

})

/* ordenar por altura */

bolhas.sort((a,b)=>a.cy-b.cy)

/* agrupar em linhas */

const linhas = []
const tolerancia = 25

bolhas.forEach(b=>{

let linha=null

for(let l of linhas){

if(Math.abs(b.cy - l.mediaY) < tolerancia){

linha=l
break

}

}

if(linha){

linha.itens.push(b)

linha.mediaY =
linha.itens.reduce((s,i)=>s+i.cy,0) / linha.itens.length

}else{

linhas.push({
mediaY:b.cy,
itens:[b]
})

}

})

/* ordenar cada linha */

linhas.forEach(l=>{

l.itens.sort((a,b)=>a.cx-b.cx)

})

/* descobrir respostas */

const letras=["A","B","C","D"]

const respostasDetectadas=[]

linhas.forEach((l,i)=>{

let maior=0
let indice=0

l.itens.forEach((b,j)=>{

if(b.count > maior){

maior=b.count
indice=j

}

})

respostasDetectadas.push(letras[indice])

})

/* mostrar resultado */

document.getElementById("reader").innerHTML=""
document.getElementById("reader").appendChild(canvas)

document.getElementById("resultado").innerHTML =
"Respostas detectadas: " + respostasDetectadas.join("")

}
  
/* =========================
LER NOVAMENTE
========================= */

function lerNovamente(){

document.getElementById("acoes").classList.add("oculto")

document.getElementById("resultado").innerHTML="Lendo novamente..."

setTimeout(lerBolhas,1000)

}

/* =========================
CONFIRMAR ENVIO
========================= */

function confirmar(){

document.getElementById("acoes").classList.add("oculto")

document.getElementById("resultado").innerHTML=

`
Enviando resultado ao Avalia+...
`

setTimeout(()=>{

document.getElementById("resultado").innerHTML=

`
✓ Resultado enviado<br><br>

Folha ${folha} registrada
`

document.getElementById("proximo").classList.remove("oculto")

},1000)

}

/* =========================
PRÓXIMA PROVA
========================= */

function reiniciar(){

document.getElementById("proximo").classList.add("oculto")

document.getElementById("resultado").innerHTML="Aponte para o QR da prova"

iniciarQR()

}

function medirEscuro(frame,largura,x,y){

let soma=0
let cont=0

for(let dy=-5;dy<5;dy++){

for(let dx=-5;dx<5;dx++){

let px = Math.floor(x+dx)
let py = Math.floor(y+dy)

let index = (py*largura+px)*4

let r = frame.data[index]
let g = frame.data[index+1]
let b = frame.data[index+2]

let brilho = (r+g+b)/3

soma += (255-brilho)
cont++

}

}

return soma/cont

}

function detectarMarcadores(frame, largura, altura){

const marcadores = []

const passo = 8
const tamanho = 20

for(let y=0;y<altura-tamanho;y+=passo){
for(let x=0;x<largura-tamanho;x+=passo){

let escuro = 0
let total = 0

for(let dy=0;dy<tamanho;dy++){
for(let dx=0;dx<tamanho;dx++){

let px = x+dx
let py = y+dy

let idx = (py*largura + px)*4

let r = frame.data[idx]
let g = frame.data[idx+1]
let b = frame.data[idx+2]

let brilho = (r+g+b)/3

if(brilho < 80) escuro++

total++

}
}

let densidade = escuro/total

if(densidade > 0.75){

marcadores.push({
x:x+tamanho/2,
y:y+tamanho/2
})

}

}
}

return marcadores
}

function agruparPontos(pontos){

const grupos = []

pontos.forEach(p=>{

let encontrado=false

for(let g of grupos){

let dx = p.x - g.cx
let dy = p.y - g.cy

if(Math.sqrt(dx*dx + dy*dy) < 40){

g.x += p.x
g.y += p.y
g.count++

g.cx = g.x / g.count
g.cy = g.y / g.count

encontrado=true
break

}

}

if(!encontrado){

grupos.push({
x:p.x,
y:p.y,
cx:p.x,
cy:p.y,
count:1
})

}

})

return grupos

}  
/* =========================
INICIAR
========================= */

iniciarQR()

</script>

</body>
</html>
