<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Scanner Avalia+</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#reader{
width:100%;
}

#resultado{
padding:12px;
font-size:18px;
}

button{
padding:14px 22px;
margin:10px;
font-size:18px;
}

.oculto{
display:none;
}

video{
width:100%;
max-width:500px;
}

canvas{
width:100%;
max-width:500px;
}

</style>
</head>

<body>

<h2>Scanner Avalia+</h2>

<div id="reader"></div>

<div id="resultado">
Aponte para o QR da prova
</div>

<div id="captura" class="oculto">
<button onclick="capturar()">CAPTURAR</button>
</div>

<div id="acoes" class="oculto">
<button onclick="confirmar()">Confirmar envio</button>
<button onclick="capturar()">Capturar novamente</button>
</div>

<script>

let scanner
let gabarito=""
let respostas=""
let folha=""
let qtd=0

/* =========================
BIP
========================= */

function beep(){

const ctx=new AudioContext()
const osc=ctx.createOscillator()

osc.connect(ctx.destination)
osc.frequency.value=900
osc.start()

setTimeout(()=>osc.stop(),150)

}

/* =========================
VIBRAÇÃO
========================= */

function vibrar(){

if(navigator.vibrate){
navigator.vibrate(150)
}

}

/* =========================
INICIAR QR
========================= */

function iniciarQR(){

scanner=new Html5Qrcode("reader")

scanner.start(

{facingMode:"environment"},

{
fps:10,

qrbox:{
width: Math.min(window.innerWidth*0.8,400),
height: Math.min(window.innerWidth*0.8,400)
}

},

(qr)=>{ lerQR(qr) }

)

}

/* =========================
LER QR
========================= */

function lerQR(dado){

if(!dado.startsWith("AVP")) return

beep()
vibrar()

scanner.stop()

let partes=dado.split("|")

folha=partes[2]
qtd=parseInt(partes[3])
gabarito=partes[4]

document.getElementById("resultado").innerHTML=

`
QR detectado ✓<br><br>
Folha ${folha}<br>
${qtd} questões<br><br>
Centralize a folha e toque CAPTURAR
`

abrirCameraBolhas()

}

/* =========================
CAMERA BOLHAS
========================= */

function abrirCameraBolhas(){

navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"}

})
.then(stream=>{

let video=document.createElement("video")

video.srcObject=stream
video.play()

document.getElementById("reader").innerHTML=""
document.getElementById("reader").appendChild(video)

document.getElementById("captura").classList.remove("oculto")

})

}

/* =========================
CAPTURAR FRAME
========================= */

function capturar(){

const video=document.querySelector("video")

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

document.getElementById("reader").innerHTML=""
document.getElementById("reader").appendChild(canvas)

processar(canvas)

}

/* =========================
PROCESSAR OMR
========================= */

function processar(canvas){

const ctx=canvas.getContext("2d")

const largura=canvas.width
const altura=canvas.height

const frame=ctx.getImageData(0,0,largura,altura)

/* área do gabarito */

const startX=largura*0.30
const startY=altura*0.20

const areaW=largura*0.45
const areaH=altura*0.45

const respostasDetectadas=[]

const letras=["A","B","C","D"]

for(let q=0;q<qtd;q++){

let y=startY+(q*(areaH/qtd))

let melhor=0
let maior=0

for(let a=0;a<4;a++){

let x=startX+(a*(areaW/4))

let escuro=0

for(let dy=-6;dy<6;dy++){
for(let dx=-6;dx<6;dx++){

let px=Math.floor(x+dx)
let py=Math.floor(y+dy)

let idx=(py*largura+px)*4

let r=frame.data[idx]
let g=frame.data[idx+1]
let b=frame.data[idx+2]

let brilho=(r+g+b)/3

escuro+=(255-brilho)

}
}

if(escuro>maior){
maior=escuro
melhor=a
}

}

respostasDetectadas.push(letras[melhor])

}

/* desenhar bolhas detectadas */

ctx.fillStyle="red"

for(let q=0;q<qtd;q++){

let y=startY+(q*(areaH/qtd))
let x=startX+(respostasDetectadas[q].charCodeAt(0)-65)*(areaW/4)

ctx.beginPath()
ctx.arc(x,y,10,0,Math.PI*2)
ctx.fill()

}

respostas=respostasDetectadas.join("")

document.getElementById("resultado").innerHTML=

`
Respostas detectadas: ${respostas}
`

document.getElementById("captura").classList.add("oculto")
document.getElementById("acoes").classList.remove("oculto")

}

/* =========================
CONFIRMAR
========================= */

function confirmar(){

document.getElementById("resultado").innerHTML=

`
✓ Resultado enviado<br><br>
Folha ${folha}
`

}

/* =========================
INICIAR
========================= */

iniciarQR()

</script>

</body>
</html>
