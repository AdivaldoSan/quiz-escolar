<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Leitor de Bolhas</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

video,canvas{
width:90%;
max-width:500px;
margin-top:10px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
}

</style>
</head>

<body>

<h2>Leitor de Bolhas</h2>

<div id="camera"></div>

<div id="resultado">Centralize o gabarito</div>

<button onclick="capturar()">Capturar</button>
<button onclick="abrirCamera()">Ler novamente</button>

<script>

/* parâmetros calibrados */

const THRESHOLD = 112
const AREA_MIN = 22
const AREA_MAX = 219

let stream

/* ======================
ABRIR CAMERA
====================== */

function abrirCamera(){

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(s=>{

stream=s

let video=document.createElement("video")

video.srcObject=s
video.play()

document.getElementById("camera").innerHTML=""
document.getElementById("camera").appendChild(video)

})

}

/* ======================
CAPTURAR FRAME
====================== */

function capturar(){

let video=document.querySelector("video")

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

document.getElementById("camera").innerHTML=""
document.getElementById("camera").appendChild(canvas)

processar(canvas)

}

/* ======================
PROCESSAR IMAGEM
====================== */

function processar(canvas){

let ctx=canvas.getContext("2d")

let largura=canvas.width
let altura=canvas.height

/* ISOLAR ÁREA DO GABARITO */

let x0 = largura*0.25
let y0 = altura*0.15
let w  = largura*0.50
let h  = altura*0.45

ctx.strokeStyle="blue"
ctx.lineWidth=3
ctx.strokeRect(x0,y0,w,h)

let frame=ctx.getImageData(x0,y0,w,h)
let data=frame.data

/* threshold */

for(let i=0;i<data.length;i+=4){

let brilho=(data[i]+data[i+1]+data[i+2])/3

let cor = brilho < THRESHOLD ? 0 : 255

data[i]=cor
data[i+1]=cor
data[i+2]=cor

}

ctx.putImageData(frame,x0,y0)

/* detectar pixels escuros */

let pontos=[]

for(let y=0;y<h;y+=4){
for(let x=0;x<w;x+=4){

let idx=(y*w+x)*4

if(data[idx]==0){
pontos.push({x,y})
}

}
}

/* agrupar */

let grupos=[]

pontos.forEach(p=>{

let achou=false

for(let g of grupos){

let dx=p.x-g.cx
let dy=p.y-g.cy

if(Math.sqrt(dx*dx+dy*dy)<20){

g.x+=p.x
g.y+=p.y
g.count++

g.cx=g.x/g.count
g.cy=g.y/g.count

achou=true
break

}

}

if(!achou){

grupos.push({
x:p.x,
y:p.y,
cx:p.x,
cy:p.y,
count:1
})

}

})

/* filtrar bolhas */

let bolhas=grupos.filter(g=>g.count>AREA_MIN && g.count<AREA_MAX)

/* desenhar bolhas */

ctx.fillStyle="yellow"

bolhas.forEach(b=>{

ctx.beginPath()
ctx.arc(b.cx+x0,b.cy+y0,6,0,Math.PI*2)
ctx.fill()

})

/* ordenar por altura */

bolhas.sort((a,b)=>a.cy-b.cy)

/* agrupar linhas */

let linhas=[]
let tolerancia=25

bolhas.forEach(b=>{

let linha=null

for(let l of linhas){

if(Math.abs(b.cy-l.media)<tolerancia){
linha=l
break
}

}

if(linha){

linha.itens.push(b)

linha.media =
linha.itens.reduce((s,i)=>s+i.cy,0)/linha.itens.length

}else{

linhas.push({
media:b.cy,
itens:[b]
})

}

})

/* descobrir respostas */

let respostas=[]

linhas.forEach(l=>{

let melhor = l.itens.reduce((a,b)=>a.count>b.count?a:b)

/* calcular coluna pela posição X */

let coluna = Math.floor(melhor.cx / (w/4))

let letra = ["A","B","C","D"][coluna]

respostas.push(letra)

/* desenhar selecionada */

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(melhor.cx+x0,melhor.cy+y0,10,0,Math.PI*2)
ctx.fill()

})

document.getElementById("resultado").innerHTML=

`
Respostas: ${respostas.join("")}<br>
Bolhas detectadas: ${bolhas.length}<br>
Linhas: ${linhas.length}
`

}

/* iniciar */

abrirCamera()

</script>

</body>
</html>
