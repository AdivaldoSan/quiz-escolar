<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Scanner Avalia+</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#reader{
width:100%;
}

canvas{
max-width:500px;
width:100%;
}

button{
padding:14px 20px;
margin:10px;
font-size:18px;
}

.oculto{
display:none;
}

</style>
</head>

<body>

<h2>Scanner Avalia+</h2>

<div id="reader"></div>

<div id="resultado">
Aponte para o QR da prova
</div>

<div id="acoes" class="oculto">
<button onclick="confirmar()">Confirmar leitura</button>
<button onclick="reiniciar()">Ler novamente</button>
</div>


<script>

let scanner
let folha=""
let qtd=0
let gabarito=""
let respostas=""

/* parâmetros calibrados */

const THRESHOLD=112
const AREA_MIN=22
const AREA_MAX=219

/* =========================
INICIAR QR
========================= */

function iniciarQR(){

scanner=new Html5Qrcode("reader")

scanner.start(

{facingMode:"environment"},

{
fps:10,
qrbox:{
width: Math.min(window.innerWidth*0.8,400),
height: Math.min(window.innerWidth*0.8,400)
}
},

(qr)=>{ lerQR(qr) }

)

}

/* =========================
LER QR
========================= */

function lerQR(dado){

if(!dado.startsWith("AVP")) return

scanner.stop()

let partes=dado.split("|")

folha=partes[2]
qtd=parseInt(partes[3])
gabarito=partes[4]

document.getElementById("resultado").innerHTML=

`
QR detectado ✓<br><br>
Centralize o gabarito
`

abrirCamera()

}

/* =========================
CAMERA
========================= */

function abrirCamera(){

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{

let video=document.createElement("video")

video.srcObject=stream
video.play()

document.getElementById("reader").innerHTML=""
document.getElementById("reader").appendChild(video)

/* captura automática */

setTimeout(capturar,1500)

})

}

/* =========================
CAPTURAR FRAME
========================= */

function capturar(){

const video=document.querySelector("video")

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

document.getElementById("reader").innerHTML=""
document.getElementById("reader").appendChild(canvas)

processar(canvas)

}

/* =========================
LER GRADE FIXA
========================= */

function lerGrade(canvas){

const ctx = canvas.getContext("2d")

const largura = canvas.width
const altura = canvas.height

const frame = ctx.getImageData(0,0,largura,altura)

/* área aproximada do gabarito */

const startX = largura*0.30
const startY = altura*0.22

const areaW = largura*0.40
const areaH = altura*0.36

const alturaLinha = areaH/qtd
const larguraColuna = areaW/4

const letras=["A","B","C","D"]

const respostasDetectadas=[]

for(let q=0;q<qtd;q++){

let y = startY + q*alturaLinha

let melhor=0
let maior=0

for(let a=0;a<4;a++){

let x = startX + a*larguraColuna

let escuro=0

for(let dy=-8;dy<8;dy++){
for(let dx=-8;dx<8;dx++){

let px=Math.floor(x+dx)
let py=Math.floor(y+dy)

let idx=(py*largura+px)*4

let brilho=(frame.data[idx]+frame.data[idx+1]+frame.data[idx+2])/3

escuro += (255-brilho)

}
}

if(escuro>maior){

maior=escuro
melhor=a

}

}

respostasDetectadas.push(letras[melhor])

}

return respostasDetectadas

}

/* =========================
PROCESSAR OMR
========================= */

function processar(canvas){

const ctx=canvas.getContext("2d")

const largura=canvas.width
const altura=canvas.height

const frame=ctx.getImageData(0,0,largura,altura)
const data=frame.data

/* threshold */

for(let i=0;i<data.length;i+=4){

let brilho=(data[i]+data[i+1]+data[i+2])/3

let cor= brilho < THRESHOLD ? 0 : 255

data[i]=cor
data[i+1]=cor
data[i+2]=cor

}

ctx.putImageData(frame,0,0)

/* detectar pixels escuros */

const pontos=[]

for(let y=0;y<altura;y+=4){
for(let x=0;x<largura;x+=4){

let idx=(y*largura+x)*4

if(data[idx]==0){

pontos.push({x,y})

}

}
}

/* agrupar */

const grupos=[]

pontos.forEach(p=>{

let achou=false

for(let g of grupos){

let dx=p.x-g.cx
let dy=p.y-g.cy

if(Math.sqrt(dx*dx+dy*dy)<20){

g.x+=p.x
g.y+=p.y
g.count++

g.cx=g.x/g.count
g.cy=g.y/g.count

achou=true
break

}

}

if(!achou){

grupos.push({
x:p.x,
y:p.y,
cx:p.x,
cy:p.y,
count:1
})

}

})

/* filtrar bolhas */

const bolhas=grupos.filter(g=>g.count>AREA_MIN && g.count<AREA_MAX)

/* desenhar bolhas detectadas */

ctx.fillStyle="yellow"

bolhas.forEach(b=>{

ctx.beginPath()
ctx.arc(b.cx,b.cy,6,0,Math.PI*2)
ctx.fill()

})

/* leitura da grade */

const respostasDetectadas = lerGrade(canvas)

respostas = respostasDetectadas.join("")

/* desenhar respostas escolhidas */

const startX = largura*0.30
const startY = altura*0.22

const areaW = largura*0.40
const areaH = altura*0.36

const alturaLinha = areaH/qtd
const larguraColuna = areaW/4

ctx.fillStyle="red"

for(let q=0;q<qtd;q++){

let y=startY + q*alturaLinha
let x=startX + (respostasDetectadas[q].charCodeAt(0)-65)*larguraColuna

ctx.beginPath()
ctx.arc(x,y,10,0,Math.PI*2)
ctx.fill()

}

/* debug */

document.getElementById("resultado").innerHTML=

`
Respostas detectadas: ${respostas}<br>
Bolhas detectadas: ${bolhas.length}
`

document.getElementById("acoes").classList.remove("oculto")

}

/* =========================
CONFIRMAR
========================= */

function confirmar(){

document.getElementById("resultado").innerHTML=

`
✓ Leitura confirmada<br><br>
Folha ${folha}<br>
Respostas: ${respostas}
`

}

/* =========================
LER NOVAMENTE
========================= */

function reiniciar(){

document.getElementById("acoes").classList.add("oculto")

document.getElementById("resultado").innerHTML="Lendo novamente..."

capturar()

}

/* iniciar */

iniciarQR()

</script>


</body>
</html>
