<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Scanner Avalia+</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#reader{
width:100%;
}

canvas{
max-width:500px;
width:100%;
}

button{
padding:14px 20px;
margin:10px;
font-size:18px;
}

.oculto{
display:none;
}

</style>
</head>

<body>

<h2>Scanner Avalia+</h2>

<div id="reader"></div>

<div id="resultado">
Aponte para o QR da prova
</div>

<div id="acoes" class="oculto">
<button onclick="confirmar()">Confirmar leitura</button>
<button onclick="reiniciar()">Ler novamente</button>
</div>

<script>

let scanner
let folha=""
let qtd=0
let gabarito=""
let respostas=""

/* parâmetros calibrados */

const THRESHOLD=112
const AREA_MIN=22
const AREA_MAX=219

/* =========================
INICIAR QR
========================= */

function iniciarQR(){

scanner=new Html5Qrcode("reader")

scanner.start(

{facingMode:"environment"},

{
fps:10,

qrbox:{
width: Math.min(window.innerWidth*0.8,400),
height: Math.min(window.innerWidth*0.8,400)
}

},

(qr)=>{ lerQR(qr) }

)

}

/* =========================
LER QR
========================= */

function lerQR(dado){

if(!dado.startsWith("AVP")) return

scanner.stop()

let partes=dado.split("|")

folha=partes[2]
qtd=parseInt(partes[3])
gabarito=partes[4]

document.getElementById("resultado").innerHTML=

`
QR detectado ✓<br><br>
Centralize o gabarito
`

abrirCamera()

}

/* =========================
CAMERA
========================= */

function abrirCamera(){

navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"}

})
.then(stream=>{

let video=document.createElement("video")

video.srcObject=stream
video.play()

document.getElementById("reader").innerHTML=""
document.getElementById("reader").appendChild(video)

/* captura automática */

setTimeout(capturar,1500)

})

}

/* =========================
CAPTURAR FRAME
========================= */

function capturar(){

const video=document.querySelector("video")

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

document.getElementById("reader").innerHTML=""
document.getElementById("reader").appendChild(canvas)

processar(canvas)

}

/* =========================
PROCESSAR OMR
========================= */

function processar(canvas){

const ctx=canvas.getContext("2d")

const largura=canvas.width
const altura=canvas.height

const frame=ctx.getImageData(0,0,largura,altura)
const data=frame.data

/* threshold */

for(let i=0;i<data.length;i+=4){

let brilho=(data[i]+data[i+1]+data[i+2])/3

let cor= brilho < THRESHOLD ? 0 : 255

data[i]=cor
data[i+1]=cor
data[i+2]=cor

}

ctx.putImageData(frame,0,0)

/* detectar pontos escuros */

const pontos=[]

for(let y=0;y<altura;y+=4){
for(let x=0;x<largura;x+=4){

let idx=(y*largura+x)*4

if(data[idx]==0){

pontos.push({x,y})

}

}
}

/* agrupar */

const grupos=[]

pontos.forEach(p=>{

let achou=false

for(let g of grupos){

let dx=p.x-g.cx
let dy=p.y-g.cy

if(Math.sqrt(dx*dx+dy*dy)<20){

g.x+=p.x
g.y+=p.y
g.count++

g.cx=g.x/g.count
g.cy=g.y/g.count

achou=true
break

}

}

if(!achou){

grupos.push({
x:p.x,
y:p.y,
cx:p.x,
cy:p.y,
count:1
})

}

})

/* filtrar bolhas */

const bolhas=grupos.filter(g=>g.count>AREA_MIN && g.count<AREA_MAX)

/* desenhar */

ctx.fillStyle="red"

bolhas.forEach(b=>{

ctx.beginPath()
ctx.arc(b.cx,b.cy,8,0,Math.PI*2)
ctx.fill()

})

/* organizar linhas */

bolhas.sort((a,b)=>a.cy-b.cy)

const linhas=[]
const tol=25

bolhas.forEach(b=>{

let linha=null

for(let l of linhas){

if(Math.abs(b.cy-l.mediaY)<tol){
linha=l
break
}

}

if(linha){

linha.itens.push(b)
linha.mediaY=
linha.itens.reduce((s,i)=>s+i.cy,0)/linha.itens.length

}else{

linhas.push({
mediaY:b.cy,
itens:[b]
})

}

})

linhas.forEach(l=>l.itens.sort((a,b)=>a.cx-b.cx))

/* escolher resposta */

const letras=["A","B","C","D"]
const respostasDetectadas=[]

linhas.forEach(l=>{

let maior=0
let indice=0

l.itens.forEach((b,i)=>{

if(b.count>maior){
maior=b.count
indice=i
}

})

respostasDetectadas.push(letras[indice])

})

respostas=respostasDetectadas.join("")

document.getElementById("resultado").innerHTML=

`
Respostas detectadas: ${respostas}
`

document.getElementById("acoes").classList.remove("oculto")

}

/* =========================
CONFIRMAR
========================= */

function confirmar(){

document.getElementById("resultado").innerHTML=

`
✓ Leitura confirmada<br><br>
Folha ${folha}<br>
Respostas: ${respostas}
`

}

/* =========================
REINICIAR
========================= */

function reiniciar(){

document.getElementById("acoes").classList.add("oculto")

document.getElementById("resultado").innerHTML="Aponte para o QR da prova"

iniciarQR()

}

/* iniciar */

iniciarQR()

</script>

</body>
</html>
