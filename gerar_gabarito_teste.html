<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Gerador Gabarito Scanner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

input{
padding:8px;
margin:5px;
font-size:16px;
width:120px;
text-transform:uppercase;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

#a4{
width:210mm;
background:white;
padding:10mm;
}

.folha{
display:flex;
align-items:center;
margin-bottom:20mm;
}

/* QR */

.qr{
width:90px;
height:90px;
margin-right:20mm;
}

/* área respostas */

.area{
position:relative;
padding:10mm;
}

/* marcadores */

.marcador{
width:12px;
height:12px;
background:black;
position:absolute;
}

.m1{top:-6px;left:-6px;}
.m2{top:-6px;right:-6px;}
.m3{bottom:-6px;left:-6px;}
.m4{bottom:-6px;right:-6px;}

.linha{
display:flex;
align-items:center;
margin-bottom:10px;
font-size:18px;
}

.numero{
width:30px;
}

.opcao{
width:22px;
height:22px;
border:2px solid black;
border-radius:50%;
margin:0 12px;
}

</style>
</head>

<body>

<h2>Gerador Gabarito Scanner</h2>

<p>Digite o gabarito (5 letras A-D)</p>

<input id="g1" placeholder="ABCDE">
<input id="g2" placeholder="ABCDE">
<input id="g3" placeholder="ABCDE">

<br>

<button onclick="gerar()">Gerar Gabaritos</button>
<button onclick="pdf()">Gerar PDF</button>

<br><br>

<div id="a4"></div>

<script>

function criarFolha(seq,gabarito){

const qtd = gabarito.length
const dadosQR=`AVP|SIM|${seq}|${qtd}|${gabarito}`

const folha=document.createElement("div")
folha.className="folha"


/* QR */

const qr=document.createElement("div")
qr.className="qr"
folha.appendChild(qr)


/* área respostas */

const area=document.createElement("div")
area.className="area"

;["m1","m2","m3","m4"].forEach(c=>{
let m=document.createElement("div")
m.className="marcador "+c
area.appendChild(m)
})


for(let i=1;i<=5;i++){

let linha=document.createElement("div")
linha.className="linha"

let num=document.createElement("div")
num.className="numero"
num.innerText=i

linha.appendChild(num)

for(let j=0;j<4;j++){

let op=document.createElement("div")
op.className="opcao"

linha.appendChild(op)

}

area.appendChild(linha)

}

folha.appendChild(area)


setTimeout(()=>{
new QRCode(qr,{
text:dadosQR,
width:90,
height:90
})
},50)

return folha

}



function gerar(){

let g1=document.getElementById("g1").value.toUpperCase()||"ABCDE"
let g2=document.getElementById("g2").value.toUpperCase()||"ABCDE"
let g3=document.getElementById("g3").value.toUpperCase()||"ABCDE"

const a4=document.getElementById("a4")
a4.innerHTML=""

a4.appendChild(criarFolha(1,g1))
a4.appendChild(criarFolha(2,g2))
a4.appendChild(criarFolha(3,g3))

}



function pdf(){

const el=document.getElementById("a4")

html2pdf().set({

margin:0,
filename:"gabarito_teste.pdf",
image:{type:"jpeg",quality:1},
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4"}

}).from(el).save()

}

</script>

</body>
</html>
