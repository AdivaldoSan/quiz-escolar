<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Gerador de Gabarito Avalia+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

input{
padding:8px;
margin:5px;
font-size:16px;
width:200px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

#a4{
width:210mm;
min-height:297mm;
background:white;
padding:20px;
margin-top:20px;
}

.folha{
width:100%;
border:2px solid #000;
padding:15px;
margin-bottom:30px;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
}

.qr{
width:100px;
height:100px;
}

.titulo{
font-size:20px;
font-weight:bold;
}

.grid{
margin-top:20px;
}

.linha{
display:flex;
align-items:center;
margin-bottom:6px;
}

.numero{
width:30px;
}

.opcao{
border:2px solid #000;
width:22px;
height:22px;
border-radius:50%;
margin:0 10px;
}

</style>
</head>


<body>

<h2>Gerador de Gabarito de Teste</h2>

<p>Digite os gabaritos (ex: ABCDABCDAB)</p>

<input id="g1" placeholder="Gabarito folha 1">
<input id="g2" placeholder="Gabarito folha 2">

<br>

<button onclick="gerar()">Gerar folhas</button>
<button onclick="gerarPDF()">Gerar PDF A4</button>

<div id="a4"></div>


<script>

function criarFolha(seq,gabarito){

const dadosQR = `AVP|TESTE|${seq}|${gabarito}`

const div = document.createElement("div")
div.className="folha"

const topo = document.createElement("div")
topo.className="topo"

const titulo = document.createElement("div")
titulo.className="titulo"
titulo.innerHTML=`Prova Teste<br>Folha ${seq}`

const qr = document.createElement("div")
qr.className="qr"

topo.appendChild(titulo)
topo.appendChild(qr)

div.appendChild(topo)

const grid = document.createElement("div")
grid.className="grid"

for(let i=0;i<gabarito.length;i++){

const linha = document.createElement("div")
linha.className="linha"

const num = document.createElement("div")
num.className="numero"
num.innerText=i+1

linha.appendChild(num)

for(let j=0;j<4;j++){

const opc = document.createElement("div")
opc.className="opcao"

linha.appendChild(opc)

}

grid.appendChild(linha)

}

div.appendChild(grid)

setTimeout(()=>{
new QRCode(qr,{
text:dadosQR,
width:100,
height:100
})
},10)

return div

}



function gerar(){

const g1 = document.getElementById("g1").value.toUpperCase()
const g2 = document.getElementById("g2").value.toUpperCase()

const a4 = document.getElementById("a4")
a4.innerHTML=""

if(g1.length>0){
a4.appendChild(criarFolha(1,g1))
}

if(g2.length>0){
a4.appendChild(criarFolha(2,g2))
}

}



function gerarPDF(){

const element = document.getElementById("a4")

html2pdf().set({

margin:0,
filename:"gabarito_avalia.pdf",
image:{type:"jpeg",quality:1},
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}

}).from(element).save()

}

</script>

</body>
</html>
