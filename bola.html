<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>OMR Lab</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
max-width:650px;
border:1px solid #444;
margin-top:15px;
}

.controls{
margin-top:15px;
}

input[type=range]{
width:250px;
}

</style>
</head>

<body>

<h2>OMR LAB</h2>

<input type="file" id="upload">

<br>

<canvas id="canvas"></canvas>

<div class="controls">

<p>
Threshold
<br>
<input type="range" id="thr" min="50" max="200" value="150">
<span id="thrval">150</span>
</p>

<p>
Área mínima
<br>
<input type="range" id="amin" min="5" max="150" value="30">
<span id="aminval">30</span>
</p>

<p>
Área máxima
<br>
<input type="range" id="amax" min="100" max="500" value="200">
<span id="amaxval">200</span>
</p>

<button onclick="ler()">LER</button>

</div>

<h3 id="resultado"></h3>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const upload = document.getElementById("upload")

let imagem = null

upload.addEventListener("change",function(e){

const file = e.target.files[0]

const reader = new FileReader()

reader.onload=function(ev){

imagem = new Image()

imagem.onload=function(){

canvas.width = imagem.width
canvas.height = imagem.height

ctx.drawImage(imagem,0,0)

}

imagem.src = ev.target.result

}

reader.readAsDataURL(file)

})

function ler(){

if(!imagem) return

ctx.drawImage(imagem,0,0)

const THRESHOLD = parseInt(thr.value)
const AREA_MIN = parseInt(amin.value)
const AREA_MAX = parseInt(amax.value)

thrval.innerText = THRESHOLD
aminval.innerText = AREA_MIN
amaxval.innerText = AREA_MAX

const frame = ctx.getImageData(0,0,canvas.width,canvas.height)
const data = frame.data

const largura = canvas.width
const altura = canvas.height

/* AREA DE BUSCA */

const xmin = largura * 0.20
const xmax = largura * 0.80

const ymin = altura * 0.10
const ymax = altura * 0.60

const pontos=[]

for(let y=ymin;y<ymax;y+=4){
for(let x=xmin;x<xmax;x+=4){

let idx=(y*largura+x)*4

let brilho=(data[idx]+data[idx+1]+data[idx+2])/3

if(brilho < THRESHOLD){
pontos.push({x,y})
}

}
}

/* AGRUPAMENTO */

const grupos=[]

pontos.forEach(p=>{

let achou=false

for(let g of grupos){

let dx=p.x-g.cx
let dy=p.y-g.cy

if(Math.sqrt(dx*dx+dy*dy)<20){

g.x+=p.x
g.y+=p.y
g.count++

g.cx=g.x/g.count
g.cy=g.y/g.count

achou=true
break

}

}

if(!achou){

grupos.push({
x:p.x,
y:p.y,
cx:p.x,
cy:p.y,
count:1
})

}

})

/* FILTRAR BOLHAS */

const bolhas=grupos.filter(g=>g.count>AREA_MIN && g.count<AREA_MAX)

/* DESENHAR BOLHAS */

ctx.fillStyle="red"

bolhas.forEach(b=>{

ctx.beginPath()
ctx.arc(b.cx,b.cy,8,0,Math.PI*2)
ctx.fill()

})

/* ORDENAR LINHAS */

bolhas.sort((a,b)=>a.cy-b.cy)

const linhas=[]
const tolerancia=25

bolhas.forEach(b=>{

let linha=null

for(let l of linhas){

if(Math.abs(b.cy-l.mediaY)<tolerancia){
linha=l
break
}

}

if(linha){

linha.itens.push(b)

linha.mediaY =
linha.itens.reduce((s,i)=>s+i.cy,0)/linha.itens.length

}else{

linhas.push({
mediaY:b.cy,
itens:[b]
})

}

})

/* ORDENAR COLUNAS */

linhas.forEach(l=>{

l.itens.sort((a,b)=>a.cx-b.cx)

l.itens = l.itens.slice(0,4)

})

/* DETECTAR RESPOSTAS */

const letras=["A","B","C","D"]

let respostas=[]

linhas.forEach(l=>{

let maior=0
let indice=0

l.itens.forEach((b,i)=>{

if(b.count>maior){
maior=b.count
indice=i
}

})

respostas.push(letras[indice])

})

document.getElementById("resultado").innerHTML =
"Respostas detectadas: "+respostas.join("")

}

</script>

</body>
</html>
