<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>OMR LAB</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
max-width:650px;
border:1px solid #444;
margin-top:20px;
}

</style>
</head>

<body>

<h2>OMR LAB</h2>

<input type="file" id="upload">

<br>

<canvas id="canvas"></canvas>

<br><br>

<button onclick="ler()">LER</button>

<h3 id="info"></h3>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")
const upload = document.getElementById("upload")

let imagem = null

upload.addEventListener("change", function(e){

const file = e.target.files[0]

const reader = new FileReader()

reader.onload = function(ev){

imagem = new Image()

imagem.onload = function(){

canvas.width = imagem.width
canvas.height = imagem.height

ctx.drawImage(imagem,0,0)

}

imagem.src = ev.target.result

}

reader.readAsDataURL(file)

})

function ler(){

if(!imagem){
alert("Carregue uma imagem primeiro")
return
}

/* redesenhar imagem */

ctx.drawImage(imagem,0,0)

const frame = ctx.getImageData(0,0,canvas.width,canvas.height)
const data = frame.data

const largura = canvas.width
const altura = canvas.height

const THRESHOLD = 150

/* área de leitura */

const xmin = largura * 0.20
const xmax = largura * 0.80

const ymin = altura * 0.10
const ymax = altura * 0.60

/* desenhar área */

ctx.strokeStyle="lime"
ctx.lineWidth=3
ctx.strokeRect(xmin,ymin,xmax-xmin,ymax-ymin)

const pontos=[]

for(let y=ymin;y<ymax;y+=4){
for(let x=xmin;x<xmax;x+=4){

let idx=(y*largura+x)*4

let r=data[idx]
let g=data[idx+1]
let b=data[idx+2]

let brilho=(r+g+b)/3

if(brilho < THRESHOLD){
pontos.push({x,y})
}

}
}

document.getElementById("info").innerHTML =
"Pixels escuros detectados: "+pontos.length

/* desenhar pixels */

ctx.fillStyle="red"

pontos.forEach(p=>{

ctx.fillRect(p.x,p.y,2,2)

})

}

</script>

</body>
</html>
